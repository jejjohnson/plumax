site_name: plumax
site_description: Differentiable, probabilistic atmospheric plume dispersion and methane retrieval models (JAX).
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/plumax
repo_name: jejjohnson/plumax

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Design:
      - Roadmap & Architecture: design/index.md
      - Prerequisites: design/00_prerequisites.md
      - Tier I — Gaussian family: design/01_tier1_gaussian.md
      - Tier II — Lagrangian: design/02_tier2_lagrangian.md
      - Tier III — Eulerian FV: design/03_tier3_eulerian.md
      - RTM stack: design/04_rtm_stack.md
      - Tier IV — Coupled E2E: design/05_tier4_coupled.md
      - Tier V — Population:
          - Overview: design/06_tier5_population.md
          - V.A — Instantaneous: design/06a_instantaneous.md
          - V.B — Point process: design/06b_point_process.md
          - V.C — Persistency: design/06c_persistency.md
          - V.D — Total emission: design/06d_total_emission.md
  - API Reference: api/reference.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["."]
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
